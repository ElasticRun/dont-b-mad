# BMad Workspace Configuration
#
# Maps project directories in this workspace so BMAD skills can resolve
# {project-root} to the correct project when the workspace contains
# multiple repos/projects.
#
# Auto-generated by install.sh. Edit freely — the installer will not
# overwrite an existing workspace.yaml unless you pass --force.

# Default project used when context is ambiguous.
# Set to a project key below, or leave empty to always prompt.
default_project: ''

# Each key is a short name; path is relative to the workspace root.
# The agent uses the project whose directory contains the file being
# discussed, or falls back to default_project / asks the user.
projects: {}
#  Example:
#  my-app:
#    path: my-app
#    description: Main application
#  shared-lib:
#    path: libs/shared
#    description: Shared library used by my-app
